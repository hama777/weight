<html><head><title>Walk List</title>
    <!-- 26/04/16 v0.02 血圧の高と低を同じグラフに追加 -->
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Style-Type" content="text/css">
    <link rel="stylesheet" href="weight.css">
    </head>
    
    <script type="text/javascript" src="https://www.google.com/jsapi"></script>

    
    <script type="text/javascript">
        google.load("visualization", "1", {packages:["corechart"]});
        google.setOnLoadCallback(
            function() {
                var data = google.visualization.arrayToDataTable([
        [       '', '血圧高','血圧低'],
    %month3_graph
                ]);
        
                var options = {
                    title: '血圧',
                    colors: ['#505deb','#e24343'] ,
                    hAxis: {title: '月'},
                    chartArea: { backgroundColor: '#f1f7f9' , left:80,right:30 },
                    backgroundColor: '#d8daf0',
                    legend: {  position: 'none'  }
                };
        
                var chart = new google.visualization.LineChart(document.getElementById('month3_graph'));
                chart.draw(data, options);
            }
        );
    </script>
